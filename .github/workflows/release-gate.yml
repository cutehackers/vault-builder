name: Release Gate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  release-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Run release gate
        run: scripts/release_gate.sh
